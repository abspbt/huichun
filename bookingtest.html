<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG 預約確認按鈕測試</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #1a1613;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: #221d19;
    border: 1px dashed #4a4038;
    border-radius: 16px;
    padding: 24px;
    max-width: 420px;
    width: 100%;
    color: #e8e0d5;
  }
  .label {
    font-size: 14px;
    color: #c9a25a;
    margin-bottom: 8px;
  }
  .summary {
    font-size: 16px;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .summary b { color: #f0d9a0; }
  button {
    width: 100%;
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    background: linear-gradient(180deg, #e8c877, #c9a24f);
    color: #2a2118;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.6; cursor: default; }
  .hint {
    font-size: 13px;
    color: #9a8f80;
    text-align: center;
    margin-top: 14px;
    line-height: 1.6;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a2118;
    border: 1px solid #c9a25a;
    color: #f0d9a0;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="card">
  <div class="label">03　選擇時段</div>
  <div class="summary">
    預約摘要：<b>2026/07/24 11:00</b>，共 <b>1</b> 位。
  </div>
  <button id="confirmBtn">送出並私訊確認</button>
  <div class="hint">
    點擊後會自動複製預約訊息，並開啟 Instagram 對話視窗，<br>
    請在對話框「長按貼上」後點擊發送即可。
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const IG_USERNAME = "hui_chun_photo";
  const bookingMessage = "您好，我想預約 2026/07/24 11:00，共 1 位，麻煩幫我確認，謝謝！";

  const btn = document.getElementById("confirmBtn");
  const toast = document.getElementById("toast");

  function showToast(text, duration = 2200) {
    toast.textContent = text;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  btn.addEventListener("click", () => {
    btn.disabled = true;

    // Try to copy — fire and forget, don't block navigation on it
    try {
      navigator.clipboard.writeText(bookingMessage);
    } catch (err) {
      // ignore, fallback message shown below anyway
    }

    showToast("訊息已複製 ✅ 正在開啟 Instagram…");

    // Navigate immediately, in the same click event, so mobile browsers
    // don't treat it as a blocked popup
    window.location.href = "https://ig.me/m/" + IG_USERNAME;

    setTimeout(() => { btn.disabled = false; }, 1500);
  });
</script>

</body>
</html>
