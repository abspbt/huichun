<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG 預約確認按鈕測試</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #1a1613;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: #221d19;
    border: 1px dashed #4a4038;
    border-radius: 16px;
    padding: 24px;
    max-width: 420px;
    width: 100%;
    color: #e8e0d5;
  }
  .label {
    font-size: 14px;
    color: #c9a25a;
    margin-bottom: 8px;
  }
  .summary {
    font-size: 16px;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .summary b { color: #f0d9a0; }
  button {
    width: 100%;
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    background: linear-gradient(180deg, #e8c877, #c9a24f);
    color: #2a2118;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.6; cursor: default; }
  .hint {
    font-size: 13px;
    color: #9a8f80;
    text-align: center;
    margin-top: 14px;
    line-height: 1.6;
  }
  .infoBox {
    background: rgba(111, 207, 111, 0.1);
    border: 1px solid rgba(111, 207, 111, 0.35);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 500;
    color: #a8dba8;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .steps {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 20px;
    padding-left: 4px;
  }
  .step {
    font-size: 16px;
    font-weight: 600;
    color: #e8e0d5;
  }
  .step.done {
    color: #6fcf6f;
  }
  .step.muted {
    color: #7a7168;
    font-weight: 500;
  }
  .warnings {
    margin-bottom: 18px;
  }
  .warnings p {
    font-size: 15.5px;
    line-height: 1.75;
    color: #e0c898;
    margin: 0 0 12px;
  }
  .warnings p:last-child { margin-bottom: 0; }
  .warnings b { color: #f0d9a0; }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a2118;
    border: 1px solid #c9a25a;
    color: #f0d9a0;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="card">
  <div class="label">03　選擇時段</div>
  <div class="summary">
    預約摘要：<b>2026/07/24 11:00</b>，共 <b>1</b> 位。
  </div>

  <div class="warnings">
    <p>⚠️ 收到我們的確認訊息後，預約才正式成立。</p>
    <p>⚠️ 若 12 小時內未收到回覆，請再次私訊或來電 0971-080-406，我們可能未收到您的 Instagram 訊息。</p>
  </div>

  <div class="infoBox">📋 已準備好預約資訊，前往 Instagram 後直接貼上即可。</div>

  <div class="steps">
    <div class="step done">✅ 已選擇時段</div>
    <div class="step">① 前往 Instagram</div>
    <div class="step">② 貼上預約資訊</div>
    <div class="step">③ 按「送出」</div>
    <div class="step muted">④ 等待我們確認</div>
  </div>

  <button id="confirmBtn">開啟 Instagram 對話</button>
  <div class="hint">
    點擊後將直接開啟 Instagram 對話<br>
    貼上預約資訊並按「送出」即可
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const IG_USERNAME = "hui_chun_photo";
  const bookingMessage = "您好，我想預約 2026/07/24 11:00，共 1 位，麻煩幫我確認，謝謝！";

  const btn = document.getElementById("confirmBtn");
  const toast = document.getElementById("toast");

  function showToast(text, duration = 2200) {
    toast.textContent = text;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  btn.addEventListener("click", () => {
    btn.disabled = true;

    // Try to copy — fire and forget, don't block navigation on it
    try {
      navigator.clipboard.writeText(bookingMessage);
    } catch (err) {
      // ignore, fallback message shown below anyway
    }

    showToast("訊息已複製 ✅ 正在開啟 Instagram…");

    // Navigate immediately, in the same click event, so mobile browsers
    // don't treat it as a blocked popup
    window.location.href = "https://ig.me/m/" + IG_USERNAME;

    setTimeout(() => { btn.disabled = false; }, 1500);
  });
</script>

</body>
</html>
