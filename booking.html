<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約拍攝時段｜Hui Chun Photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1b1a;
    --card:#242220;
    --card-2:#2c2925;
    --ivory:#f2ede6;
    --ivory-dim:#c8c2b8;
    --gold:#c9a24b;
    --gold-soft:rgba(201,162,75,0.16);
    --sage:#7c9473;
    --rose:#a8674f;
    --line:rgba(242,237,230,0.12);
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,162,75,0.10), transparent),
      var(--bg);
    color:var(--ivory);
    font-family:'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height:100vh;
    padding:48px 20px 80px;
    line-height:1.5;
  }
  .wrap{max-width:640px;margin:0 auto;}

  .sprockets{
    display:flex;justify-content:space-between;padding:0 2px;margin-bottom:18px;
    opacity:0.5;
  }
  .sprockets span{width:6px;height:9px;border-radius:2px;background:var(--gold);opacity:0.6;}

  header{margin-bottom:36px;text-align:center;}
  .eyebrow{
    font-size:12px;letter-spacing:0.28em;text-transform:uppercase;
    color:var(--gold);margin-bottom:10px;font-weight:500;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(28px,6vw,38px);
    margin:0 0 10px;
    letter-spacing:0.01em;
  }
  header p{color:var(--ivory-dim);font-size:14.5px;margin:0;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px 22px;
    margin-bottom:20px;
    transition:opacity .2s ease;
  }
  .card.disabled-step{opacity:0.4;pointer-events:none;}
  .card h2{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:18px;
    margin:0 0 4px;
    display:flex;align-items:baseline;gap:8px;
  }
  .card h2 .num{
    font-size:13px;color:var(--gold);font-family:'Work Sans',sans-serif;font-weight:600;
    letter-spacing:0.05em;
  }
  .card .sub{color:var(--ivory-dim);font-size:13px;margin:0 0 16px;}

  /* Step 1: guest count segmented control */
  .segmented{display:flex;gap:10px;}
  .segmented button{
    flex:1;padding:16px 12px;border-radius:12px;
    background:var(--card-2);border:1px solid var(--line);color:var(--ivory);
    font-family:'Work Sans',sans-serif;cursor:pointer;text-align:center;
    transition:all .15s ease;
  }
  .segmented button .big{
    display:block;font-family:'Fraunces',serif;font-size:22px;margin-bottom:2px;
  }
  .segmented button .small{display:block;font-size:12px;color:var(--ivory-dim);}
  .segmented button:hover{border-color:var(--gold);}
  .segmented button.selected{
    background:var(--gold-soft);border-color:var(--gold);
  }
  .segmented button.selected .small{color:var(--gold);}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-head .month-label{font-family:'Fraunces',serif;font-size:16px;font-weight:500;}
  .cal-head button{
    background:var(--card-2);border:1px solid var(--line);color:var(--ivory);
    width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s ease;
  }
  .cal-head button:hover{background:var(--gold-soft);}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .weekdays span{text-align:center;font-size:11px;color:var(--ivory-dim);letter-spacing:0.05em;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .day{
    position:relative;
    aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
    border-radius:8px;
    font-size:13.5px;
    background:transparent;
    border:1px solid transparent;
    color:var(--ivory-dim);
    cursor:default;
  }
  .day.pad{visibility:hidden;}
  .day.has-slots{
    color:var(--ivory);
    border-color:var(--line);
    cursor:pointer;
    background:var(--card-2);
  }
  .day.has-slots:hover{border-color:var(--gold);}
  .day.has-slots::after{
    content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;background:var(--sage);
  }
  .day.selected{
    background:var(--gold-soft);border-color:var(--gold);color:var(--ivory);
    font-weight:600;
  }
  .day.today{box-shadow:inset 0 0 0 1px var(--gold);}
  .day.past{opacity:0.28;}

  /* time slots */
  .slots{display:flex;flex-wrap:wrap;gap:8px;min-height:40px;}
  .slot-btn{
    padding:10px 16px;border-radius:999px;
    background:var(--card-2);border:1px solid var(--line);
    color:var(--ivory);font-size:13.5px;cursor:pointer;
    font-family:'Work Sans',sans-serif;
    transition:all .15s ease;
  }
  .slot-btn:hover{border-color:var(--gold);}
  .slot-btn.selected{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);font-weight:600;}
  .slot-btn.full{opacity:0.4;cursor:not-allowed;color:var(--ivory-dim);}
  .slot-btn.full:hover{border-color:var(--line);}
  .slot-btn .tag-full{font-size:11px;color:var(--rose);margin-left:6px;}
  .placeholder-text{color:var(--ivory-dim);font-size:13.5px;padding:8px 2px;}

  /* summary */
  .summary{
    background:var(--card-2);border:1px dashed var(--line);
    border-radius:10px;padding:14px 16px;font-size:13.5px;color:var(--ivory-dim);
    margin-bottom:20px;
  }
  .summary b{color:var(--ivory);font-weight:600;}

  .submit-btn{
    width:100%;padding:16px;border-radius:12px;border:none;
    background:var(--gold);color:#231f18;font-weight:600;font-size:15.5px;
    cursor:pointer;font-family:'Work Sans',sans-serif;letter-spacing:0.01em;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(201,162,75,0.25);}
  .submit-btn:disabled{background:var(--card-2);color:var(--ivory-dim);cursor:not-allowed;transform:none;box-shadow:none;}

  .helper-note{text-align:center;font-size:12px;color:var(--ivory-dim);margin-top:14px;}

  .result-panel{
    display:none;
    margin-top:18px;
    background:var(--card);
    border:1px solid var(--sage);
    border-radius:var(--radius);
    padding:20px 22px;
  }
  .result-panel.show{display:block;}
  .result-check{
    font-family:'Fraunces',serif;font-size:16px;color:var(--sage);margin-bottom:12px;
  }
  .result-message{
    background:var(--card-2);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;font-size:14px;color:var(--ivory);
    margin-bottom:14px;line-height:1.6;
    user-select:all;
    -webkit-user-select:all;
  }
  .result-steps{
    font-size:13.5px;color:var(--ivory-dim);line-height:1.7;
  }
  .result-steps b{color:var(--gold);font-weight:600;}

  .status-msg{
    text-align:center;font-size:13px;padding:10px;border-radius:10px;margin-bottom:16px;
  }
  .status-msg.loading{background:var(--card-2);color:var(--ivory-dim);}
  .status-msg.error{background:rgba(168,103,79,0.15);color:#e2a893;}

  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);
    background:var(--ivory);color:#231f18;padding:12px 20px;border-radius:10px;
    font-size:13.5px;font-weight:500;opacity:0;pointer-events:none;
    transition:all .25s ease;box-shadow:0 8px 24px rgba(0,0,0,0.35);
    max-width:90vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:420px){
    .card{padding:20px 16px;}
    .day{font-size:12.5px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="sprockets">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <header>
    <div class="eyebrow">Booking Request</div>
    <h1>預約拍攝時段</h1>
    <p>選擇人數、日期與時段，我們會透過 Instagram 私訊與你確認細節。</p>
  </header>

  <div id="statusMsg" class="status-msg loading">正在讀取目前預約狀況…</div>

  <!-- Step 1: Guest count -->
  <div class="card">
    <h2><span class="num">01</span> 選擇人數</h2>
    <p class="sub">2 位需佔用連續兩個時段</p>
    <div class="segmented">
      <button type="button" class="guest-opt selected" data-count="1">
        <span class="big">1 位</span>
        <span class="small">單一時段</span>
      </button>
      <button type="button" class="guest-opt" data-count="2">
        <span class="big">2 位</span>
        <span class="small">連續兩時段</span>
      </button>
    </div>
  </div>

  <!-- Step 2: Date -->
  <div class="card" id="dateCard">
    <h2><span class="num">02</span> 選擇日期</h2>
    <p class="sub">灰點代表當日尚有可預約時段（僅開放未來 14 天內）</p>
    <div class="cal-head">
      <button id="prevMonth" aria-label="上個月">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextMonth" aria-label="下個月">›</button>
    </div>
    <div class="weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>

  <!-- Step 3: Time -->
  <div class="card" id="timeCard">
    <h2><span class="num">03</span> 選擇時段</h2>
    <p class="sub" id="timeSub">請先選擇日期</p>
    <div class="slots" id="slotsWrap">
      <span class="placeholder-text">尚未選擇日期</span>
    </div>
  </div>

  <div class="summary" id="summaryBox">
    請完成上方步驟以產生預約摘要。
  </div>

  <button class="submit-btn" id="submitBtn" disabled>送出並私訊確認</button>
  <p class="helper-note" id="helperNote">點擊後會自動複製預約訊息，並開啟 Instagram 個人頁面，請貼上訊息傳送即可。</p>

  <div class="result-panel" id="resultPanel">
    <div class="result-check">✅ 預約訊息已複製</div>
    <div class="result-message" id="resultMessage"></div>
    <div class="result-steps">
      請到剛才開啟的 <b>Instagram 對話視窗</b>，<b>貼上並傳送</b>給老闆，等待老闆回應確認。
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ====== 設定區 ======
  var SHEET_ID = "1-0UwxcPNxA95FFRCNICMbhheGtC5-Z9wwBGUQRaLZP0";
  var SHEET_NAME = "booking";
  var IG_USERNAME = "hui_chun_photo";

  var gvizUrl = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json" +
                (SHEET_NAME ? "&sheet=" + encodeURIComponent(SHEET_NAME) : "");

  // 每天固定開放的基礎時段（欄位順序需與試算表 B~F 欄一一對應）
  var SLOT_TIMES = ["10:00", "11:00", "13:30", "14:30", "15:30"];

  // 2位（連續兩時段）合法的起始時段組合
  var PAIR_STARTS = [
    { start: "10:00", second: "11:00", label: "10:00 - 12:00" },
    { start: "13:30", second: "14:30", label: "13:30 - 15:30" },
    { start: "14:30", second: "15:30", label: "14:30 - 16:30" }
  ];

  // 開放預約的天數範圍：只開放「今天起算未來 N 天內」可以預約
  var BOOKING_WINDOW_DAYS = 14;

  // bookedMap: { "YYYY-MM-DD": { "10:00": true, "14:30": true, ... } }
  // 有值＝該時段已被預約（不可再選），沒有出現的時段視為開放
  var bookedMap = {};

  var state = {
    year: new Date().getFullYear(),
    month: new Date().getMonth(), // 0-indexed
    guestCount: 1,
    selectedDate: null,   // "YYYY-MM-DD"
    selectedSlot: null     // { time, label, isPair }
  };

  var statusMsg = document.getElementById('statusMsg');
  var monthLabel = document.getElementById('monthLabel');
  var daysGrid = document.getElementById('daysGrid');
  var slotsWrap = document.getElementById('slotsWrap');
  var timeSub = document.getElementById('timeSub');
  var summaryBox = document.getElementById('summaryBox');
  var submitBtn = document.getElementById('submitBtn');
  var toast = document.getElementById('toast');
  var resultPanel = document.getElementById('resultPanel');
  var resultMessage = document.getElementById('resultMessage');
  var helperNote = document.getElementById('helperNote');

  function pad(n){ return n < 10 ? "0"+n : ""+n; }
  function dateKey(y,m,d){ return y + "-" + pad(m+1) + "-" + pad(d); }
  function todayKey(){
    var t = new Date();
    return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  }
  function maxBookableKey(){
    var t = new Date();
    t.setDate(t.getDate() + BOOKING_WINDOW_DAYS);
    return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  }

  // ---- 解析 GViz 特殊格式，例如 "Date(2026,6,16)" ----
  function parseGvizCellRaw(cell){
    if(!cell) return null;
    var v = cell.v;
    if(typeof v === "string"){
      var m = v.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
      if(m){
        var y = parseInt(m[1],10);
        var mo = parseInt(m[2],10); // 0-indexed month from gviz
        var d = parseInt(m[3],10);
        return { kind:"date", y:y, mo:mo, d:d };
      }
    }
    return { kind:"raw", value: v };
  }

  function extractDateString(cell){
    var parsed = parseGvizCellRaw(cell);
    if(!parsed) return null;
    if(parsed.kind === "date"){
      return dateKey(parsed.y, parsed.mo, parsed.d);
    }
    if(parsed.value == null) return null;
    var s = String(parsed.value).trim();
    var m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if(m){
      return m[1] + "-" + pad(parseInt(m[2],10)) + "-" + pad(parseInt(m[3],10));
    }
    return null;
  }

  function cellHasValue(cell){
    if(!cell) return false;
    var v = cell.v;
    return v !== null && v !== undefined && v !== "";
  }

  function loadAvailability(){
    fetch(gvizUrl)
      .then(function(res){
        if(!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function(text){
        var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
        if(!match) throw new Error("無法解析回應格式");
        var json = JSON.parse(match[1]);
        if(!json.table || !json.table.rows) throw new Error("試算表格式不符");

        // A欄＝日期，B~F欄依序對應 SLOT_TIMES 五個固定時段
        // 該欄有填任何內容＝已被預約，留空＝開放
        var rows = json.table.rows;
        var map = {};
        rows.forEach(function(row){
          var cells = row.c;
          if(!cells || !cells[0]) return;
          var dKey = extractDateString(cells[0]);
          if(!dKey) return;
          var dayBooked = map[dKey] || {};
          SLOT_TIMES.forEach(function(time, idx){
            var cell = cells[idx + 1];
            if(cellHasValue(cell)) dayBooked[time] = true;
          });
          map[dKey] = dayBooked;
        });

        bookedMap = map;
        statusMsg.style.display = "none";
        renderCalendar();
        renderSlots();
      })
      .catch(function(err){
        statusMsg.className = "status-msg error";
        statusMsg.textContent = "讀取預約狀況失敗，請確認 Google 試算表已設為「知道連結的任何人皆可檢視」。(" + err.message + ")";
        renderCalendar();
        renderSlots();
      });
  }

  // ====== 業務邏輯：判斷某日期在目前人數選擇下是否還有空檔 ======
  function dateHasAvailability(dKey){
    var booked = bookedMap[dKey] || {};
    if(state.guestCount === 1){
      return SLOT_TIMES.some(function(t){ return !booked[t]; });
    }
    return PAIR_STARTS.some(function(p){ return !booked[p.start] && !booked[p.second]; });
  }

  // ====== 日曆渲染 ======
  var monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

  function renderCalendar(){
    monthLabel.textContent = state.year + " · " + monthNames[state.month];
    daysGrid.innerHTML = "";

    var firstDay = new Date(state.year, state.month, 1).getDay();
    var daysInMonth = new Date(state.year, state.month+1, 0).getDate();
    var tKey = todayKey();
    var maxKey = maxBookableKey();

    for(var i=0;i<firstDay;i++){
      var pad_ = document.createElement('div');
      pad_.className = "day pad";
      daysGrid.appendChild(pad_);
    }

    for(var d=1; d<=daysInMonth; d++){
      var key = dateKey(state.year, state.month, d);
      var el = document.createElement('div');
      el.className = "day";
      el.textContent = d;

      var isPast = key < tKey;
      var isBeyondWindow = key > maxKey;
      var hasSlots = !isPast && !isBeyondWindow && dateHasAvailability(key);

      if(isPast || isBeyondWindow){
        el.classList.add("past");
      } else if(hasSlots){
        el.classList.add("has-slots");
        el.addEventListener('click', (function(k){
          return function(){ selectDate(k); };
        })(key));
      }
      if(key === tKey) el.classList.add("today");
      if(key === state.selectedDate) el.classList.add("selected");

      daysGrid.appendChild(el);
    }
  }

  document.getElementById('prevMonth').addEventListener('click', function(){
    state.month--;
    if(state.month < 0){ state.month = 11; state.year--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', function(){
    state.month++;
    if(state.month > 11){ state.month = 0; state.year++; }
    renderCalendar();
  });

  // ====== 選擇人數 ======
  var guestButtons = document.querySelectorAll('.guest-opt');
  guestButtons.forEach(function(btn){
    btn.addEventListener('click', function(){
      var count = parseInt(btn.getAttribute('data-count'), 10);
      if(count === state.guestCount) return;
      state.guestCount = count;
      guestButtons.forEach(function(b){ b.classList.remove('selected'); });
      btn.classList.add('selected');

      // 人數改變會影響整體可預約狀況，重置日期與時段選擇
      state.selectedDate = null;
      state.selectedSlot = null;
      renderCalendar();
      renderSlots();
      updateSummary();
    });
  });

  // ====== 選擇日期 ======
  function selectDate(key){
    state.selectedDate = key;
    state.selectedSlot = null;
    renderCalendar();
    renderSlots();
    updateSummary();
  }

  function formatDateLabel(key){
    var parts = key.split("-");
    return parts[0] + "/" + parts[1] + "/" + parts[2];
  }

  // ====== 時段渲染 ======
  function renderSlots(){
    slotsWrap.innerHTML = "";
    if(!state.selectedDate){
      timeSub.textContent = "請先選擇日期";
      slotsWrap.innerHTML = '<span class="placeholder-text">尚未選擇日期</span>';
      return;
    }
    timeSub.textContent = formatDateLabel(state.selectedDate) + "・" + (state.guestCount === 1 ? "1 位可選時段" : "2 位可選時段（連續兩小時）");

    var booked = bookedMap[state.selectedDate] || {};

    if(state.guestCount === 1){
      SLOT_TIMES.forEach(function(time){
        var full = !!booked[time];
        appendSlotBtn(time, time, full, { time: time, label: time, isPair: false });
      });
    } else {
      PAIR_STARTS.forEach(function(p){
        var full = !!booked[p.start] || !!booked[p.second];
        appendSlotBtn(p.start + "_pair", p.label, full, { time: p.start, label: p.label, isPair: true });
      });
    }
  }

  function appendSlotBtn(keyId, label, full, slotData){
    var btn = document.createElement('button');
    btn.type = "button";
    btn.className = "slot-btn";
    if(full){
      btn.classList.add("full");
      btn.disabled = true;
      btn.innerHTML = label + '<span class="tag-full">已滿</span>';
    } else {
      btn.textContent = label;
    }
    if(!full && state.selectedSlot && state.selectedSlot.time === slotData.time && state.selectedSlot.isPair === slotData.isPair){
      btn.classList.add("selected");
    }
    if(!full){
      btn.addEventListener('click', function(){
        state.selectedSlot = slotData;
        renderSlots();
        updateSummary();
      });
    }
    slotsWrap.appendChild(btn);
  }

  // ====== 摘要 & 送出 ======
  function updateSummary(){
    var ready = state.selectedDate && state.selectedSlot;
    if(!ready){
      summaryBox.innerHTML = "請完成上方步驟以產生預約摘要。";
      submitBtn.disabled = true;
      return;
    }
    summaryBox.innerHTML = "預約摘要：<b>" + formatDateLabel(state.selectedDate) + " " +
      state.selectedSlot.label + "</b>，共 <b>" + state.guestCount + " 位</b>。";
    submitBtn.disabled = false;
  }

  function buildMessage(){
    return "你好，我想預約 " + formatDateLabel(state.selectedDate) + " " +
      state.selectedSlot.label + "，共 " + state.guestCount + " 位。";
  }

  function showToast(text){
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 3200);
  }

  submitBtn.addEventListener('click', function(){
    if(!state.selectedDate || !state.selectedSlot) return;
    var message = buildMessage();
    var igUrl = "https://www.instagram.com/" + IG_USERNAME + "/";

    // 重要：一定要在點擊事件中「同步」立刻開啟新分頁，
    // 不能包在 setTimeout 或 clipboard 的 .then() 之後，
    // 否則手機瀏覽器容易判定這不是使用者直接觸發的動作而擋掉彈出視窗。
    window.open(igUrl, '_blank', 'noopener');

    // 複製剪貼簿是背景動作，成功與否都不影響上面已經開啟的 IG 分頁
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(message).catch(function(){
        // 複製失敗也沒關係，下方常駐面板會把文字印出來，使用者可以手動長按複製
      });
    }

    // 用常駐面板取代會消失的 Toast，作為主要的操作說明
    resultMessage.textContent = message;
    resultPanel.classList.add('show');
    helperNote.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = "已送出，請至 Instagram 完成傳送";

    resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  // ====== 初始化 ======
  updateSummary();
  renderCalendar();
  renderSlots();
  loadAvailability();

})();
</script>
</body>
</html>
