<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回春視務所｜線上預約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #16231C;
    --card: #1E2F26;
    --card-alt: #223528;
    --paper: #F3F1E9;
    --mint: #A9D9B0;
    --mint-bright: #C8ECC7;
    --peach: #F0B48C;
    --peach-bright: #F6C9A5;
    --ink: #EDEEE6;
    --muted: #93AA9C;
    --line: rgba(169, 217, 176, 0.18);
    --danger: #E08A6B;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    background: var(--bg);
    color: var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width: 480px; margin: 0 auto; padding: 32px 20px 60px; }

  header{ text-align:center; margin-bottom: 28px; }
  .eyebrow{ font-family:'Space Mono', monospace; font-size:11px; letter-spacing:0.24em; color:var(--mint); text-transform:uppercase; margin-bottom:10px; }
  h1{ font-family:'Noto Serif TC', serif; font-weight:900; font-size: 30px; color:var(--paper); }
  .sub{ margin-top:6px; font-size:13px; color:var(--muted); }

  /* progress */
  .steps{ display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom: 30px; }
  .step-dot{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:12px; font-weight:700; background: var(--card); color:var(--muted); border:1px solid var(--line); transition: all 0.25s ease; }
  .step-dot.active{ background: var(--mint); color:#12201A; border-color: var(--mint); }
  .step-dot.done{ background: var(--card); color:var(--mint-bright); border-color: var(--mint); }
  .step-line{ width: 24px; height:1px; background: var(--line); }

  .panel{ animation: rise 0.4s ease-out; }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .panel-title{ font-size:14px; color:var(--muted); margin-bottom:16px; text-align:center; }

  /* option cards for step 1 */
  .option-grid{ display:flex; flex-direction:column; gap:12px; }
  .option-card{
    background: var(--card); border:1px solid var(--line); border-radius:16px;
    padding:20px; text-align:left; cursor:pointer; color:var(--ink);
    display:flex; align-items:center; gap:16px; transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .option-card:active{ transform: scale(0.98); }
  .option-card:hover{ border-color: var(--mint); }
  .option-icon{ width:42px; height:42px; flex-shrink:0; border-radius:10px; background: var(--card-alt); display:flex; align-items:center; justify-content:center; color: var(--mint-bright); }
  .option-icon svg{ width:22px; height:22px; }
  .option-title{ font-weight:700; font-size:16px; margin-bottom:2px; }
  .option-desc{ font-size:12.5px; color:var(--muted); line-height:1.5; }

  /* date chips */
  .date-scroll{ display:flex; gap:10px; overflow-x:auto; padding: 4px 2px 14px; scrollbar-width:none; }
  .date-scroll::-webkit-scrollbar{ display:none; }
  .date-chip{
    flex-shrink:0; width:64px; padding:12px 0; border-radius:14px; text-align:center;
    background: var(--card); border:1px solid var(--line); color:var(--ink); cursor:pointer;
    font-family:'Space Mono', monospace; transition: all 0.15s ease;
  }
  .date-chip .dow{ font-size:11px; color:var(--muted); margin-bottom:4px; font-family:'Noto Sans TC', sans-serif; }
  .date-chip .day{ font-size:20px; font-weight:700; }
  .date-chip.selected{ background: var(--mint); color:#12201A; border-color:var(--mint); }
  .date-chip.selected .dow{ color:#274232; }

  /* time buttons */
  .time-grid{ display:flex; flex-direction:column; gap:10px; }
  .time-btn{
    width:100%; padding:16px; border-radius:14px; border:1px solid var(--line);
    background: var(--card); color: var(--ink); font-family:'Space Mono', monospace; font-size:16px;
    font-weight:700; text-align:left; cursor:pointer; display:flex; justify-content:space-between; align-items:center;
    transition: all 0.15s ease;
  }
  .time-btn:hover:not(.disabled){ border-color: var(--peach); }
  .time-btn:active:not(.disabled){ transform: scale(0.98); }
  .time-btn .tag{ font-family:'Noto Sans TC', sans-serif; font-size:12px; font-weight:500; color:var(--muted); }
  .time-btn.disabled{ opacity:0.4; cursor:not-allowed; color: var(--muted); }
  .time-btn.disabled .tag{ color: var(--danger); font-weight:700; }
  .time-btn.selected{ background: var(--peach); color:#2A1B10; border-color:var(--peach); }
  .time-btn.selected .tag{ color:#4A2E17; }

  .loading{ text-align:center; padding:30px 0; color:var(--muted); font-size:13px; }
  .spinner{ width:22px; height:22px; border:2px solid var(--line); border-top-color: var(--mint); border-radius:50%; margin:0 auto 10px; animation: spin 0.8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* form */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; color:var(--muted); margin-bottom:6px; }
  .field input{
    width:100%; padding:14px; border-radius:12px; border:1px solid var(--line);
    background: var(--card); color:var(--ink); font-family:'Noto Sans TC', sans-serif; font-size:15px;
  }
  .field input:focus{ outline:none; border-color: var(--mint); }
  .summary-box{
    background: var(--card-alt); border-radius:14px; padding:16px 18px; margin-bottom:20px;
    font-size:13.5px; color: var(--mint-bright); line-height:1.9;
  }
  .summary-box b{ color: var(--peach-bright); font-family:'Space Mono', monospace; }

  .btn-primary{
    width:100%; padding:16px; border-radius:999px; border:none;
    background: linear-gradient(135deg, var(--peach-bright), var(--peach));
    color:#2A1B10; font-weight:700; font-size:16px; cursor:pointer;
    transition: transform 0.15s ease;
  }
  .btn-primary:active{ transform: scale(0.97); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }

  .btn-back{
    display:block; margin: 16px auto 0; background:none; border:none; color:var(--muted);
    font-size:13px; cursor:pointer; text-decoration:underline; text-underline-offset:3px;
  }

  .error-msg{ color: var(--danger); font-size:13px; text-align:center; margin-top:10px; min-height:18px; }

  /* success */
  .success-wrap{ text-align:center; padding: 20px 0; }
  .success-icon{ width:64px; height:64px; margin:0 auto 20px; border-radius:50%; background: var(--card-alt); display:flex; align-items:center; justify-content:center; color: var(--mint-bright); }
  .success-icon svg{ width:32px; height:32px; }
  .success-wrap h2{ font-family:'Noto Serif TC', serif; font-size:22px; color: var(--paper); margin-bottom:10px; }
  .success-wrap p{ font-size:13.5px; color:var(--muted); line-height:1.8; margin-bottom: 24px; }

  .social-row{ display:flex; flex-direction:column; gap:10px; margin-top:8px; }
  .social-btn{ display:flex; align-items:center; justify-content:center; gap:8px; padding:14px; border-radius:999px;
    text-decoration:none; font-weight:700; font-size:14px; border:1px solid var(--mint); color:var(--mint-bright); }
  .social-btn svg{ width:16px; height:16px; }

  footer{ text-align:center; margin-top:40px; font-size:11.5px; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">ONLINE BOOKING</div>
    <h1>回春視務所</h1>
    <div class="sub">線上預約證件照拍攝時段</div>
  </header>

  <div class="steps" id="stepsIndicator"></div>

  <div id="app"></div>

  <footer>回春視務所｜證件照．現拍現修</footer>
</div>

<script>
/* =======================================================
   請把下面這一行換成你部署 Apps Script 後拿到的網址
   ======================================================= */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzs6ZdkAl00CAfJFevhmJbBdwOnPsxIVO9qOV4ldzcgAlIJtN0PKqaTmdWzGM4sTQWj/exec';

const BASE_SLOTS = ['10:00', '11:00', '13:30', '14:30', '15:30'];
const TWO_SLOT_PAIRS = {
  '10:00': { pair: ['10:00', '11:00'], label: '10:00 - 12:00' },
  '13:30': { pair: ['13:30', '14:30'], label: '13:30 - 15:30' },
  '14:30': { pair: ['14:30', '15:30'], label: '14:30 - 16:30' }
};
const DOW = ['日', '一', '二', '三', '四', '五', '六'];

let state = {
  step: 1,
  people: null,
  date: null,
  time: null,
  bookedMap: null,
  name: '',
  phone: ''
};

function pad(n){ return n < 10 ? '0' + n : '' + n; }
function toISODate(d){ return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }

function renderSteps(){
  const labels = ['人數', '日期', '時段', '完成'];
  let html = '';
  labels.forEach(function(_, i){
    const n = i + 1;
    let cls = 'step-dot';
    if (n < state.step) cls += ' done';
    else if (n === state.step) cls += ' active';
    html += '<div class="' + cls + '">' + n + '</div>';
    if (i < labels.length - 1) html += '<div class="step-line"></div>';
  });
  document.getElementById('stepsIndicator').innerHTML = html;
}

function render(){
  renderSteps();
  const app = document.getElementById('app');
  if (state.step === 1) app.innerHTML = stepPeopleHTML();
  else if (state.step === 2) app.innerHTML = stepDateHTML();
  else if (state.step === 3) app.innerHTML = stepTimeHTML();
  else if (state.step === 4) app.innerHTML = stepFormHTML();
  else if (state.step === 5) app.innerHTML = stepSuccessHTML();
  attachHandlers();
}

/* ---------- Step 1: 人數 ---------- */
function stepPeopleHTML(){
  return '' +
  '<div class="panel">' +
    '<div class="panel-title">請選擇本次預約人數</div>' +
    '<div class="option-grid">' +
      '<div class="option-card" data-people="1">' +
        '<div class="option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg></div>' +
        '<div><div class="option-title">1 位</div><div class="option-desc">單人證件照，約 60 分鐘</div></div>' +
      '</div>' +
      '<div class="option-card" data-people="2">' +
        '<div class="option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="3.2"/><circle cx="16" cy="8" r="3.2"/><path d="M2 21c0-3.8 3-6 6-6s6 2.2 6 6M12 21c0-3.4 2.6-5.5 6-5.5s6 2.1 6 5.5"/></svg></div>' +
        '<div><div class="option-title">2 位</div><div class="option-desc">兩人同時預約，需連續兩小時</div></div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/* ---------- Step 2: 日期 ---------- */
function stepDateHTML(){
  const today = new Date();
  let chips = '';
  for (let i = 0; i < 21; i++){
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const iso = toISODate(d);
    const selected = state.date === iso ? ' selected' : '';
    chips += '<div class="date-chip' + selected + '" data-date="' + iso + '">' +
      '<div class="dow">' + (i === 0 ? '今天' : DOW[d.getDay()]) + '</div>' +
      '<div class="day">' + d.getDate() + '</div>' +
    '</div>';
  }
  return '' +
  '<div class="panel">' +
    '<div class="panel-title">選擇預約日期</div>' +
    '<div class="date-scroll">' + chips + '</div>' +
    '<button class="btn-back" id="backTo1">← 重新選擇人數</button>' +
  '</div>';
}

/* ---------- Step 3: 時段 ---------- */
function stepTimeHTML(){
  return '' +
  '<div class="panel">' +
    '<div class="panel-title">選擇時段</div>' +
    '<div id="timeArea"><div class="loading"><div class="spinner"></div>讀取目前預約狀況中…</div></div>' +
    '<button class="btn-back" id="backTo2">← 重新選擇日期</button>' +
  '</div>';
}

function fetchAndRenderSlots(){
  const area = document.getElementById('timeArea');
  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') !== -1){
    area.innerHTML = '<div class="error-msg" style="padding:20px 0;">尚未設定 Apps Script 網址，請參考說明文件完成串接。</div>';
    return;
  }
  fetch(APPS_SCRIPT_URL + '?date=' + encodeURIComponent(state.date))
    .then(function(res){ return res.json(); })
    .then(function(data){
      state.bookedMap = data.booked || {};
      area.innerHTML = renderTimeButtons();
      attachTimeHandlers();
    })
    .catch(function(){
      area.innerHTML = '<div class="error-msg" style="padding:20px 0;">讀取預約資料失敗，請檢查網路連線後重試。</div>';
    });
}

function renderTimeButtons(){
  const booked = state.bookedMap || {};
  let html = '<div class="time-grid">';

  if (state.people === 1){
    BASE_SLOTS.forEach(function(slot){
      const isBooked = !!booked[slot];
      const selected = state.time === slot ? ' selected' : '';
      html += '<button class="time-btn' + (isBooked ? ' disabled' : selected) + '" ' +
        (isBooked ? 'disabled' : 'data-time="' + slot + '"') + '>' +
        '<span>' + slot + '</span>' +
        (isBooked ? '<span class="tag">已滿</span>' : '<span class="tag">可預約</span>') +
      '</button>';
    });
  } else {
    Object.keys(TWO_SLOT_PAIRS).forEach(function(start){
      const info = TWO_SLOT_PAIRS[start];
      const conflict = info.pair.some(function(t){ return !!booked[t]; });
      const selected = state.time === start ? ' selected' : '';
      html += '<button class="time-btn' + (conflict ? ' disabled' : selected) + '" ' +
        (conflict ? 'disabled' : 'data-time="' + start + '"') + '>' +
        '<span>' + info.label + '</span>' +
        (conflict ? '<span class="tag">已滿</span>' : '<span class="tag">可預約</span>') +
      '</button>';
    });
  }

  html += '</div>';
  return html;
}

function attachTimeHandlers(){
  document.querySelectorAll('.time-btn[data-time]').forEach(function(btn){
    btn.addEventListener('click', function(){
      state.time = btn.getAttribute('data-time');
      state.step = 4;
      render();
    });
  });
}

/* ---------- Step 4: 表單 ---------- */
function stepFormHTML(){
  const timeLabel = state.people === 2 ? TWO_SLOT_PAIRS[state.time].label : state.time;
  return '' +
  '<div class="panel">' +
    '<div class="panel-title">填寫聯絡資訊確認預約</div>' +
    '<div class="summary-box">' +
      '日期：<b>' + state.date + '</b><br>' +
      '時段：<b>' + timeLabel + '</b><br>' +
      '人數：<b>' + state.people + ' 位</b>' +
    '</div>' +
    '<div class="field"><label>姓名</label><input type="text" id="inputName" placeholder="請輸入姓名" value="' + state.name + '"></div>' +
    '<div class="field"><label>聯絡電話</label><input type="tel" id="inputPhone" placeholder="請輸入手機號碼" value="' + state.phone + '"></div>' +
    '<button class="btn-primary" id="submitBooking">確認預約</button>' +
    '<div class="error-msg" id="formError"></div>' +
    '<button class="btn-back" id="backTo3">← 重新選擇時段</button>' +
  '</div>';
}

function submitBooking(){
  const nameInput = document.getElementById('inputName');
  const phoneInput = document.getElementById('inputPhone');
  const errorEl = document.getElementById('formError');
  const name = nameInput.value.trim();
  const phone = phoneInput.value.trim();

  if (!name || !phone){
    errorEl.textContent = '請填寫姓名與電話';
    return;
  }
  if (!/^[0-9\-+ ]{8,15}$/.test(phone)){
    errorEl.textContent = '電話格式看起來不太對，請確認後再送出';
    return;
  }

  state.name = name;
  state.phone = phone;
  errorEl.textContent = '';

  const btn = document.getElementById('submitBooking');
  btn.disabled = true;
  btn.textContent = '送出中…';

  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') !== -1){
    errorEl.textContent = '尚未設定 Apps Script 網址，無法送出預約。';
    btn.disabled = false;
    btn.textContent = '確認預約';
    return;
  }

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      date: state.date,
      time: state.time,
      people: state.people,
      name: state.name,
      phone: state.phone
    })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    if (data.success){
      state.step = 5;
      render();
    } else {
      errorEl.textContent = data.message || '預約失敗，請重新選擇時段';
      btn.disabled = false;
      btn.textContent = '確認預約';
      // 若衝突，重新拉取最新時段狀態
      state.step = 3;
      render();
      fetchAndRenderSlots();
    }
  })
  .catch(function(){
    errorEl.textContent = '網路異常，請稍後再試';
    btn.disabled = false;
    btn.textContent = '確認預約';
  });
}

/* ---------- Step 5: 完成 ---------- */
function stepSuccessHTML(){
  const timeLabel = state.people === 2 ? TWO_SLOT_PAIRS[state.time].label : state.time;
  return '' +
  '<div class="panel success-wrap">' +
    '<div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 6L9 17l-5-5"/></svg></div>' +
    '<h2>預約完成</h2>' +
    '<p>' + state.date + '　' + timeLabel + '<br>已為 ' + state.name + ' 預約 ' + state.people + ' 位<br>如需更改或取消，歡迎私訊我們</p>' +
    '<div class="social-row">' +
      '<a class="social-btn" href="https://www.instagram.com/hui_chun_photo/" target="_blank" rel="noopener noreferrer">Instagram 私訊</a>' +
      '<a class="social-btn" href="https://www.facebook.com/share/1DHoCosWMm/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook 私訊</a>' +
    '</div>' +
    '<button class="btn-back" id="bookAgain">再預約一組</button>' +
  '</div>';
}

/* ---------- handlers ---------- */
function attachHandlers(){
  if (state.step === 1){
    document.querySelectorAll('.option-card').forEach(function(card){
      card.addEventListener('click', function(){
        state.people = Number(card.getAttribute('data-people'));
        state.step = 2;
        render();
      });
    });
  }
  if (state.step === 2){
    document.querySelectorAll('.date-chip').forEach(function(chip){
      chip.addEventListener('click', function(){
        state.date = chip.getAttribute('data-date');
        state.time = null;
        state.step = 3;
        render();
        fetchAndRenderSlots();
      });
    });
    const back = document.getElementById('backTo1');
    if (back) back.addEventListener('click', function(){ state.step = 1; render(); });
  }
  if (state.step === 3){
    const back = document.getElementById('backTo2');
    if (back) back.addEventListener('click', function(){ state.step = 2; render(); });
    fetchAndRenderSlots();
  }
  if (state.step === 4){
    const submitBtn = document.getElementById('submitBooking');
    if (submitBtn) submitBtn.addEventListener('click', submitBooking);
    const back = document.getElementById('backTo3');
    if (back) back.addEventListener('click', function(){ state.step = 3; render(); });
  }
  if (state.step === 5){
    const again = document.getElementById('bookAgain');
    if (again) again.addEventListener('click', function(){
      state = { step: 1, people: null, date: null, time: null, bookedMap: null, name: '', phone: '' };
      render();
    });
  }
}

render();
</script>
</body>
</html>
