<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>預約時段｜Hui Chun Photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1D2D44;
    --card-bg:#243A5A;
    --card-border:rgba(141,160,183,0.20);
    --white:#E6E9EE;
    --gray:#8DA0B7;
    --gray-dim:rgba(141,160,183,0.42);
    --gold:#D4BA8A;
    --gold-bg:rgba(212,186,138,0.10);
    --gold-border:rgba(212,186,138,0.45);
    --blue:#AEBFD1;
    --blue-bg:rgba(141,160,183,0.10);
    --blue-border:rgba(141,160,183,0.55);
    --green:#8FBFA0;
    --red:#C97B6E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;
    background:var(--bg);color:var(--white);
    font-family:'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .wrap{
    height:100vh;height:100dvh;
    display:flex;flex-direction:column;
    padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
  }

  .topbar{
    flex:0 0 auto;
    display:flex;align-items:baseline;justify-content:space-between;
    padding:clamp(10px,2.4vh,18px) clamp(14px,3.5vw,22px) clamp(6px,1.4vh,10px);
  }
  .topbar .left{display:flex;align-items:baseline;gap:10px;}
  .topbar .title{
    font-weight:700;font-size:clamp(13px,2.5vh,17px);letter-spacing:0.01em;color:var(--white);
  }
  .topbar .subtitle{font-size:clamp(9.5px,1.8vh,12px);color:var(--gray);font-weight:500;}
  .topbar .right{
    display:flex;align-items:center;gap:7px;font-size:clamp(8.5px,1.6vh,11px);color:var(--gray);
  }
  .topbar .right .time{color:var(--white);font-weight:600;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gray-dim);flex-shrink:0;}
  .dot.live{background:var(--green);box-shadow:0 0 6px rgba(62,217,138,0.7);}
  .dot.err{background:var(--red);}

  .days-list{
    flex:1 1 auto;
    display:flex;flex-direction:column;
    gap:clamp(6px,1.3vh,12px);
    min-height:0;
    padding:0 clamp(14px,3.5vw,22px) clamp(8px,1.6vh,14px);
  }
  .day-card{
    flex:1 1 0;min-height:0;
    display:flex;align-items:center;gap:clamp(8px,2vw,18px);
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:clamp(10px,1.6vh,16px);
    padding:0 clamp(10px,2.2vw,18px);
    position:relative;
    overflow:hidden;
  }
  .day-card.today{
    background:linear-gradient(180deg, var(--gold-bg), var(--card-bg) 70%);
    border-color:rgba(240,185,74,0.25);
  }
  .day-card.today::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--gold);
  }

  .date-block{
    flex:0 0 auto;
    width:clamp(60px,15vw,92px);
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;
  }
  .date-block .date-text{
    font-weight:700;font-size:clamp(12px,2.7vh,17px);color:var(--white);letter-spacing:0.01em;white-space:nowrap;
  }
  .day-card.today .date-block .date-text{color:var(--gold);}
  .date-block .weekday-row{
    display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:3px;
  }
  .date-block .weekday-text{font-size:clamp(9px,1.75vh,11px);color:var(--gray);font-weight:500;white-space:nowrap;}
  .date-block .today-tag{
    font-size:clamp(7.5px,1.4vh,9px);color:var(--bg);background:var(--gold);
    padding:1px 5px;border-radius:999px;font-weight:700;white-space:nowrap;
  }

  .slots-line{
    flex:1 1 auto;min-width:0;
    display:flex;gap:clamp(4px,1.1vw,10px);
  }
  .slot{
    flex:1 1 0;min-width:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:clamp(6px,1vh,9px);
    font-size:clamp(9px,1.85vh,11.5px);
    line-height:1.15;
    border:1.3px solid var(--blue-border);
    background:var(--blue-bg);
    color:var(--blue);
    font-weight:600;
    padding:clamp(4px,1vh,8px) 2px;
  }
  .slot .t{white-space:nowrap;}
  .slot .tag{
    font-size:clamp(6.5px,1.15vh,8px);
    font-weight:500;letter-spacing:0.01em;
    margin-top:2px;color:var(--gray-dim);
  }
  .slot.blocked{
    background:rgba(255,255,255,0.02);
    border:1.4px solid rgba(255,255,255,0.09);
    color:var(--gray-dim);
    font-weight:500;
  }
  .slot.blocked .t{text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.18);}

  .legend{
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;gap:clamp(14px,3.5vw,26px);
    padding:clamp(6px,1.4vh,10px) 10px;
    border-top:1px solid var(--card-border);
    font-size:clamp(8.5px,1.6vh,10.5px);color:var(--gray);
  }
  .legend .item{display:flex;align-items:center;gap:5px;}
  .legend .sq{width:10px;height:10px;border-radius:3px;border:1.3px solid var(--blue-border);background:var(--blue-bg);}
  .legend .sq.off{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.02);}
  .legend .dot-legend{width:9px;height:9px;border-radius:50%;background:var(--gold);}

  @media (max-width:340px){
    .topbar{padding:8px 10px 6px;}
    .days-list{padding:0 10px 8px;gap:5px;}
    .day-card{padding:0 8px;gap:6px;}
    .date-block{width:56px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="left">
      <span class="title">回春視務所 證件照 預約時段</span>
      <span class="subtitle">未來一週</span>
    </div>
    <div class="right">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">讀取中</span>
      <span class="time" id="statusTime"></span>
    </div>
  </div>

  <div class="days-list" id="daysList"></div>

  <div class="legend">
    <span class="item"><span class="sq"></span>可預約</span>
    <span class="item"><span class="sq off"></span>不可預約</span>
    <span class="item"><span class="dot-legend"></span>今天</span>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ====== 設定區（與預約頁共用同一份資料來源）======
  var SHEET_ID = "1-0UwxcPNxA95FFRCNICMbhheGtC5-Z9wwBGUQRaLZP0";
  var SHEET_NAME = "booking";
  var gvizUrl = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json" +
                (SHEET_NAME ? "&sheet=" + encodeURIComponent(SHEET_NAME) : "");

  var SLOT_TIMES = ["10:00", "11:00", "13:30", "14:30", "15:30"];
  var DAYS_TO_SHOW = 8; // 含今天共 8 天

  var bookedMap = {}; // { "YYYY-MM-DD": { "10:00": true, ... } }

  var daysList = document.getElementById('daysList');
  var statusDot = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');
  var statusTime = document.getElementById('statusTime');

  var weekdayNames = ["日","一","二","三","四","五","六"];

  function pad(n){ return n < 10 ? "0"+n : ""+n; }
  function dateKey(y,m,d){ return y + "-" + pad(m+1) + "-" + pad(d); }
  function todayKey(){
    var t = new Date();
    return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  }
  function timeToMinutes(t){
    var p = t.split(':');
    return parseInt(p[0],10) * 60 + parseInt(p[1],10);
  }
  function nowMinutes(){
    var d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  }
  function isSlotTimePassed(timeStr){
    return nowMinutes() > timeToMinutes(timeStr);
  }
  function nowHHMM(){
    var d = new Date();
    return pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  // ---- 解析 GViz 特殊格式 ----
  function parseGvizCellRaw(cell){
    if(!cell) return null;
    var v = cell.v;
    if(typeof v === "string"){
      var m = v.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
      if(m){
        return { kind:"date", y:parseInt(m[1],10), mo:parseInt(m[2],10), d:parseInt(m[3],10) };
      }
    }
    return { kind:"raw", value: v };
  }
  function extractDateString(cell){
    var parsed = parseGvizCellRaw(cell);
    if(!parsed) return null;
    if(parsed.kind === "date") return dateKey(parsed.y, parsed.mo, parsed.d);
    if(parsed.value == null) return null;
    var s = String(parsed.value).trim();
    var m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if(m) return m[1] + "-" + pad(parseInt(m[2],10)) + "-" + pad(parseInt(m[3],10));
    return null;
  }
  function cellHasValue(cell){
    if(!cell) return false;
    var v = cell.v;
    return v !== null && v !== undefined && v !== "";
  }

  function loadAvailability(){
    statusText.textContent = "讀取中";
    statusTime.textContent = "";
    statusDot.className = "dot";
    fetch(gvizUrl)
      .then(function(res){
        if(!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function(text){
        var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
        if(!match) throw new Error("格式解析失敗");
        var json = JSON.parse(match[1]);
        if(!json.table || !json.table.rows) throw new Error("試算表格式不符");

        var rows = json.table.rows;
        var map = {};
        rows.forEach(function(row){
          var cells = row.c;
          if(!cells || !cells[0]) return;
          var dKey = extractDateString(cells[0]);
          if(!dKey) return;
          var dayBooked = map[dKey] || {};
          SLOT_TIMES.forEach(function(time, idx){
            var cell = cells[idx + 1];
            if(cellHasValue(cell)) dayBooked[time] = true;
          });
          map[dKey] = dayBooked;
        });
        bookedMap = map;
        statusDot.className = "dot live";
        statusText.textContent = "已同步";
        statusTime.textContent = nowHHMM();
        render();
      })
      .catch(function(err){
        statusDot.className = "dot err";
        statusText.textContent = "讀取失敗";
        statusTime.textContent = nowHHMM();
        render();
      });
  }

  function formatDateLine(y, m, d){
    return pad(m+1) + "/" + pad(d);
  }

  function render(){
    daysList.innerHTML = "";
    var base = new Date();
    var tKey = todayKey();

    for(var i=0; i<DAYS_TO_SHOW; i++){
      var d = new Date(base.getFullYear(), base.getMonth(), base.getDate() + i);
      var key = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      var isToday = key === tKey;
      var booked = bookedMap[key] || {};

      var card = document.createElement('div');
      card.className = "day-card" + (isToday ? " today" : "");

      var dateBlock = document.createElement('div');
      dateBlock.className = "date-block";
      dateBlock.innerHTML =
        '<span class="date-text">' + formatDateLine(d.getFullYear(), d.getMonth(), d.getDate()) + '</span>' +
        '<span class="weekday-row"><span class="weekday-text">星期' + weekdayNames[d.getDay()] + '</span>' +
        (isToday ? '<span class="today-tag">今天</span>' : '') + '</span>';
      card.appendChild(dateBlock);

      var slotsLine = document.createElement('div');
      slotsLine.className = "slots-line";

      SLOT_TIMES.forEach(function(time){
        var timePassed = isToday && isSlotTimePassed(time);
        var isBooked = !!booked[time];
        var blocked = timePassed || isBooked;

        var slot = document.createElement('div');
        slot.className = "slot" + (blocked ? " blocked" : "");
        var html = '<span class="t">' + time + '</span>';
        if(blocked){
          html += '<span class="tag">不可預約</span>';
        }
        slot.innerHTML = html;
        slotsLine.appendChild(slot);
      });

      card.appendChild(slotsLine);
      daysList.appendChild(card);
    }
  }

  // 初始渲染 + 讀取資料
  render();
  loadAvailability();

  // 每 30 秒重新檢查「今天」是否有時段過期；每 60 秒重新抓一次試算表資料
  setInterval(render, 30000);
  setInterval(loadAvailability, 60000);

})();
</script>
</body>
</html>
