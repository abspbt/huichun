<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>預約時段總覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Serif+TC:wght@500;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0: #060a18;
    --bg-1: #0b1330;
    --bg-2: #0f1a3c;
    --gold: #e8c877;
    --gold-bright: #fbe7ad;
    --gold-dim: #7c6a3c;
    --gold-line: rgba(232, 200, 119, 0.22);
    --gold-glow: rgba(251, 231, 173, 0.35);
    --muted: #6b6450;
    --muted-2: #857a54;
    --blocked-bg: #030509;
    --ink-on-gold: #241a05;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-0);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Noto Sans TC', 'Noto Serif TC', serif;
    color: var(--gold);
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(232,200,119,0.07), transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 110%, rgba(15,26,60,0.9), transparent 60%),
      linear-gradient(165deg, #060a18 0%, #0a1230 55%, #060a18 100%);
  }

  .app {
    display: flex; flex-direction: column;
    height: 100dvh; width: 100%;
    padding: 10px 13px 8px;
  }

  /* ---------- header ---------- */
  .topbar {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 8px; margin-bottom: 6px;
    position: relative;
  }
  .topbar::after{
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 3px;
    background:
      linear-gradient(90deg, transparent, var(--gold-dim) 15%, var(--gold) 50%, var(--gold-dim) 85%, transparent);
    opacity: 0.55;
  }
  .topbar::before{
    content: "";
    position: absolute; left: 0; right: 0; bottom: -4px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-line) 30%, var(--gold-line) 70%, transparent);
  }

  .brand { display: flex; align-items: baseline; gap: 9px; }
  .brand-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: clamp(14px, 3.8vw, 17px);
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold) 45%, #b9963f 75%, var(--gold-bright));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .brand-sub {
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 2.3vw, 10.5px);
    color: var(--gold-dim);
    letter-spacing: 0.5px;
  }

  .head-actions { display: flex; align-items: center; gap: 8px; }
  .clock {
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px, 3vw, 14px);
    color: var(--gold-bright);
    text-shadow: 0 0 8px var(--gold-glow);
    letter-spacing: 1px;
  }
  .icon-btn {
    appearance: none; cursor: pointer;
    background: linear-gradient(180deg, rgba(232,200,119,0.14), rgba(232,200,119,0.04));
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    border-radius: 5px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto;
  }
  .icon-btn:active { transform: scale(0.92); }

  /* ---------- day grid (view mode) ---------- */
  .days {
    flex: 1 1 auto; min-height: 0;
    display: grid; grid-template-rows: repeat(8, 1fr);
  }

  .day-row {
    min-height: 0;
    display: flex; flex-direction: column; justify-content: center; gap: 3px;
    padding: 3px 0;
    position: relative;
  }
  .day-row + .day-row::before{
    content: "";
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-line) 20%, var(--gold-line) 80%, transparent);
  }

  .day-head { display: flex; align-items: baseline; gap: 8px; flex: 0 0 auto; }

  .day-date {
    font-family: 'Space Mono', monospace; font-weight: 700;
    font-size: clamp(11.5px, 3vw, 14.5px);
    letter-spacing: 0.5px;
    color: var(--gold-bright);
    text-shadow: 0 0 6px var(--gold-glow);
  }
  .day-week {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 600;
    font-size: clamp(11px, 2.9vw, 13.5px);
    color: var(--gold-dim);
  }
  .today-badge {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: clamp(8px, 2.1vw, 9.5px);
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 1.5px 7px;
    border-radius: 3px;
    color: var(--ink-on-gold);
    background: linear-gradient(160deg, var(--gold-bright), var(--gold) 60%, #b9963f);
    box-shadow: 0 0 6px rgba(232,200,119,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
  }

  .slots-row { flex: 1 1 auto; min-height: 0; display: flex; gap: 5px; }

  .slot {
    flex: 1 1 0; min-width: 0;
    border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    font-family: 'Space Mono', monospace;
    line-height: 1.15;
    border: 1px solid transparent;
  }
  .slot .t { font-size: clamp(10px, 2.8vw, 13px); font-weight: 700; }
  .slot .label {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: clamp(7.5px, 2vw, 8.8px);
    margin-top: 1px; letter-spacing: 0.5px;
  }

  .slot.open {
    background: linear-gradient(160deg, rgba(232,200,119,0.10), rgba(232,200,119,0.03));
    border-color: rgba(232,200,119,0.4);
  }
  .slot.open .t { color: var(--gold-bright); text-shadow: 0 0 5px var(--gold-glow); }
  .slot.open::before{
    content: ""; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: rgba(251,231,173,0.6);
  }

  .slot.blocked {
    background: var(--blocked-bg);
    border-color: rgba(232,200,119,0.10);
  }
  .slot.blocked .t { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--muted-2); }
  .slot.blocked .label { color: var(--muted-2); }

  /* ---------- paste / import mode ---------- */
  .paste-wrap {
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: column; gap: 10px;
    overflow-y: auto;
  }
  .paste-card {
    background: linear-gradient(160deg, rgba(232,200,119,0.06), rgba(15,26,60,0.4));
    border: 1px solid var(--gold-line);
    border-radius: 8px;
    padding: 12px 13px;
  }
  .paste-card h2 {
    margin: 0 0 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px; font-weight: 700; color: var(--gold-bright);
    letter-spacing: 1px;
  }
  .paste-steps {
    margin: 0; padding-left: 18px;
    font-size: 12.5px; line-height: 1.9;
    color: #cbb98a;
  }
  .paste-steps b { color: var(--gold-bright); }
  .sheet-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 8px; font-size: 12px;
    color: var(--gold-bright);
    text-decoration: none;
    border: 1px solid var(--gold-dim);
    padding: 5px 10px; border-radius: 5px;
  }
  textarea {
    width: 100%; min-height: 90px; resize: vertical;
    background: var(--blocked-bg);
    border: 1px solid var(--gold-line);
    border-radius: 6px;
    color: var(--gold-bright);
    font-family: 'Space Mono', monospace;
    font-size: 11.5px;
    padding: 10px;
  }
  .paste-actions { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  .btn-primary {
    appearance: none; cursor: pointer;
    background: linear-gradient(160deg, var(--gold-bright), var(--gold) 55%, #b9963f);
    color: var(--ink-on-gold);
    border: none; border-radius: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700; font-size: 13px;
    padding: 9px 18px;
    box-shadow: 0 2px 10px rgba(232,200,119,0.25);
  }
  .btn-primary:active { transform: translateY(1px); }
  .btn-ghost {
    appearance: none; cursor: pointer; background: transparent;
    border: 1px solid var(--gold-dim); color: var(--gold);
    border-radius: 6px; font-size: 12.5px; padding: 8px 14px;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .error-msg {
    font-size: 12px; color: #ffb4a0; margin-top: 8px;
    display: none;
  }
  .error-msg.show { display: block; }

  .status-screen {
    flex: 1 1 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: var(--gold-dim); font-size: 13px; text-align: center;
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-title">預約時段總覽</div>
        <div class="brand-sub" id="rangeLabel">未載入資料</div>
      </div>
      <div class="head-actions">
        <div class="clock" id="clock">--:--</div>
        <button class="icon-btn" id="toggleBtn" title="更新資料">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="content"></div>
  </div>

<script>
(function(){
  const DAYS_TO_SHOW = 8;
  const WEEKDAYS = ['日','一','二','三','四','五','六'];
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-0UwxcPNxA95FFRCNICMbhheGtC5-Z9wwBGUQRaLZP0/edit?usp=drivesdk';
  const STORAGE_KEY = 'booking-schedule-raw';

  const contentEl = document.getElementById('content');
  const clockEl = document.getElementById('clock');
  const rangeLabelEl = document.getElementById('rangeLabel');
  const toggleBtn = document.getElementById('toggleBtn');

  let latestSchedule = null;
  let mode = 'loading'; // 'loading' | 'view' | 'paste'

  function startOfDay(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
  function pad2(n){ return String(n).padStart(2,'0'); }

  async function saveRaw(raw){
    try {
      if (window.storage) await window.storage.set(STORAGE_KEY, raw, false);
    } catch(e){ /* ignore persistence failures */ }
  }

  async function loadRaw(){
    try {
      if (!window.storage) return null;
      const r = await window.storage.get(STORAGE_KEY, false);
      return r ? r.value : null;
    } catch(e){
      return null;
    }
  }

  function parsePastedData(raw){
    const lines = raw.replace(/\r/g,'').split('\n').filter(l => l.trim() !== '');
    if(lines.length < 2) throw new Error('資料不足，請確認貼上的內容包含表頭列與至少一列日期資料');

    const header = lines[0].split('\t');
    const slotCols = [];
    for(let i=1;i<header.length;i++){
      const label = header[i] || '';
      const m = label.match(/([0-9]{1,2}:[0-9]{2})/);
      if(m) slotCols.push({ index: i, time: m[1] });
    }
    if(slotCols.length === 0){
      throw new Error('找不到時段欄位，請確認第一列（表頭）有包含時間，例如「10:00」');
    }

    const dayRows = [];
    for(let li = 1; li < lines.length; li++){
      const cells = lines[li].split('\t');
      const dateStr = (cells[0] || '').trim();
      if(!dateStr) continue;
      const dm = dateStr.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日/);
      if(!dm) continue;
      const month = parseInt(dm[1],10), day = parseInt(dm[2],10);
      const slots = {};
      for(const sc of slotCols){
        const val = (cells[sc.index] || '').trim();
        slots[sc.time] = { booked: val !== '' };
      }
      dayRows.push({ month, day, slots });
    }
    if(dayRows.length === 0){
      throw new Error('沒有辨識到日期資料，請確認日期格式如「07月22日」');
    }
    return { dayRows, slotOrder: slotCols.map(s => s.time) };
  }

  function attachRealDates(dayRows){
    const now = new Date();
    const year = now.getFullYear();
    let base = new Date(year, dayRows[0].month - 1, dayRows[0].day);
    const diffDays = Math.round((startOfDay(base) - startOfDay(now)) / 86400000);
    if(diffDays < -200) base.setFullYear(year + 1);
    else if(diffDays > 200) base.setFullYear(year - 1);

    return dayRows.map((d, i) => {
      const dt = new Date(base);
      dt.setDate(base.getDate() + i);
      return Object.assign({}, d, { date: dt });
    });
  }

  function isPastSlot(dayDate, timeStr){
    const today0 = startOfDay(new Date()).getTime();
    const day0 = startOfDay(dayDate).getTime();
    if(day0 !== today0) return day0 < today0;
    const [h, m] = timeStr.split(':').map(Number);
    const slotDate = new Date(dayDate);
    slotDate.setHours(h, m, 0, 0);
    return slotDate.getTime() <= Date.now();
  }

  function buildSchedule(raw){
    const { dayRows, slotOrder } = parsePastedData(raw);
    const scheduleAll = attachRealDates(dayRows);
    const today0 = startOfDay(new Date()).getTime();
    let idx = scheduleAll.findIndex(d => startOfDay(d.date).getTime() === today0);
    if(idx === -1) idx = scheduleAll.findIndex(d => d.date.getTime() >= today0);
    if(idx === -1) idx = 0;
    const display = scheduleAll.slice(idx, idx + DAYS_TO_SHOW);
    return { display, slotOrder };
  }

  function renderView(schedule){
    mode = 'view';
    toggleBtn.title = '更新資料';
    const { display, slotOrder } = schedule;

    const first = display[0].date;
    const last = display[display.length - 1].date;
    rangeLabelEl.textContent = `${pad2(first.getMonth()+1)}/${pad2(first.getDate())} – ${pad2(last.getMonth()+1)}/${pad2(last.getDate())}`;

    let html = '<div class="days">';
    display.forEach((d, i) => {
      const isToday = i === 0 && startOfDay(d.date).getTime() === startOfDay(new Date()).getTime();
      const wk = WEEKDAYS[d.date.getDay()];
      const dateLabel = `${d.date.getFullYear()}/${pad2(d.date.getMonth()+1)}/${pad2(d.date.getDate())}`;

      html += `<div class="day-row">
        <div class="day-head">
          <span class="day-date">${dateLabel}</span>
          <span class="day-week">週${wk}</span>
          ${isToday ? '<span class="today-badge">今天</span>' : ''}
        </div>
        <div class="slots-row">`;

      slotOrder.forEach(time => {
        const slotInfo = d.slots[time];
        const booked = slotInfo ? slotInfo.booked : false;
        const past = isPastSlot(d.date, time);
        const blocked = booked || past;
        const label = booked ? '已預約' : (past ? '已截止' : '');
        html += `<div class="slot ${blocked ? 'blocked' : 'open'}">
          <div class="t">${time}</div>
          ${blocked ? `<div class="label">${label}</div>` : ''}
        </div>`;
      });

      html += `</div></div>`;
    });
    html += '</div>';
    contentEl.innerHTML = html;
  }

  function renderPaste(prefill, errorMsg){
    mode = 'paste';
    toggleBtn.title = '查看班表';
    rangeLabelEl.textContent = '貼上資料';
    contentEl.innerHTML = `
      <div class="paste-wrap">
        <div class="paste-card">
          <h2>貼上你的預約表資料</h2>
          <ol class="paste-steps">
            <li>打開 Google 試算表</li>
            <li>選取 <b>表頭列</b>（日期＋各時段欄）到你要顯示的<b>所有日期列</b></li>
            <li>按 <b>Ctrl+C</b>（或 Cmd+C）複製</li>
            <li>貼到下方欄位，再按「更新顯示」</li>
          </ol>
          <a class="sheet-link" href="${SHEET_URL}" target="_blank" rel="noopener">開啟試算表 ↗</a>
        </div>
        <div class="paste-card" style="flex:1; display:flex; flex-direction:column;">
          <textarea id="pasteArea" placeholder="在這裡貼上（Ctrl+V）...">${prefill ? prefill.replace(/</g,'&lt;') : ''}</textarea>
          <div class="error-msg ${errorMsg ? 'show' : ''}" id="errorMsg">${errorMsg || ''}</div>
          <div class="paste-actions">
            <button class="btn-primary" id="applyBtn">更新顯示</button>
            ${latestSchedule ? '<button class="btn-ghost" id="cancelBtn">取消</button>' : ''}
          </div>
        </div>
      </div>
    `;
    document.getElementById('applyBtn').addEventListener('click', async () => {
      const raw = document.getElementById('pasteArea').value;
      try {
        const schedule = buildSchedule(raw);
        latestSchedule = schedule;
        await saveRaw(raw);
        renderView(schedule);
      } catch(err){
        const em = document.getElementById('errorMsg');
        em.textContent = err && err.message ? err.message : '資料解析失敗，請確認格式';
        em.classList.add('show');
      }
    });
    const cancelBtn = document.getElementById('cancelBtn');
    if(cancelBtn){
      cancelBtn.addEventListener('click', () => renderView(latestSchedule));
    }
  }

  function tickClock(){
    const now = new Date();
    clockEl.textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  }

  toggleBtn.addEventListener('click', () => {
    if(mode === 'view'){
      renderPaste(latestSchedule ? null : null);
    } else if(mode === 'paste' && latestSchedule){
      renderView(latestSchedule);
    }
  });

  async function init(){
    tickClock();
    setInterval(() => {
      tickClock();
      if(mode === 'view' && latestSchedule) renderView(latestSchedule);
    }, 30000);

    const raw = await loadRaw();
    if(raw){
      try {
        const schedule = buildSchedule(raw);
        latestSchedule = schedule;
        renderView(schedule);
      } catch(err){
        renderPaste(raw, err.message);
      }
    } else {
      renderPaste();
    }
  }

  init();
})();
</script>
</body>
</html>
